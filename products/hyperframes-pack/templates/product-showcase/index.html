<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Showcase</title>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12/dist/gsap.min.js"></script>
<style>
  :root { --primary: #6c5ce7; --bg: #0a0a1a; --text: #fff; --card: #16163a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); overflow: hidden; font-family: -apple-system, sans-serif; }
  #scene { width: 1920px; height: 1080px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; }
  .product-frame { width: 400px; height: 400px; border-radius: 32px; background: linear-gradient(135deg, var(--card), var(--primary)); opacity: 0; transform: scale(0.5) rotate(-10deg); display: flex; align-items: center; justify-content: center; font-size: 120px; margin-bottom: 40px; }
  .product-title { font-size: 48px; font-weight: 800; color: var(--text); opacity: 0; text-align: center; }
  .product-desc { font-size: 24px; color: #a29bfe; opacity: 0; text-align: center; margin-top: 16px; }
  .cta-tag { display: inline-block; padding: 16px 40px; background: var(--primary); border-radius: 12px; font-size: 20px; font-weight: 700; color: white; margin-top: 40px; opacity: 0; }
  .badge { position: absolute; top: 40px; right: 40px; background: #e17055; color: white; padding: 8px 20px; border-radius: 20px; font-size: 16px; font-weight: 600; opacity: 0; }
</style>
</head>
<body>
<div id="scene">
  <div class="badge" id="badge">NEW</div>
  <div class="product-frame" id="productBox">✦</div>
  <div class="product-title" id="title">Introducing the Future</div>
  <div class="product-desc" id="desc">Smarter. Faster. More beautiful than ever.</div>
  <div class="cta-tag" id="cta">Learn More →</div>
</div>
<script>
  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } })
  tl.to('#badge', { opacity: 1, y: 0, duration: 0.4 }, 0)
  .to('#productBox', { opacity: 1, scale: 1, rotation: 0, duration: 1, ease: 'elastic.out(1, 0.6)' }, '-=0.2')
  .to('#title', { opacity: 1, y: 0, duration: 0.6 }, '-=0.4')
  .to('#desc', { opacity: 1, y: 0, duration: 0.5 }, '-=0.2')
  .to('#cta', { opacity: 1, y: 0, duration: 0.5, ease: 'back.out(1.5)' }, '-=0.1')
</script>
</body>
</html>
